<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>N_LAND | Servidor</title>
    <link rel="icon" href="https://static-cdn.jtvnw.net/jtv_user_pictures/3f87bd40-3b9a-40e0-8501-0e6c4040dc0c-profile_image-300x300.png" type="image/png">
    
    <style>
        :root {
            --win-bg: #c0c0c0;
            --win-light: #ffffff;
            --win-dark: #808080;
            --win-black: #000000;
        }

        html { scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Courier New', Courier, monospace; background: #050505; color: white; overflow-x: hidden; }

        .parallax-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: url('https://preview.redd.it/nala-estaba-sufriendo-jsjjsjaj-v0-2ivvf8feb0ke1.jpeg?auto=webp&s=4dd8ae471d1c5cb0f13178d8b31fe2428d7116d1') no-repeat center center;
            background-size: cover; filter: brightness(0.3) blur(4px);
        }

        /* TÍTULO SIN CUADRO */
        .title-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h1.main-title { 
            font-size: 7rem; margin: 0; color: #ff0000; text-shadow: 5px 5px 0px #fff; 
            text-transform: uppercase; letter-spacing: 10px;
        }

        /* BOTONES REDES ESTILO WIN98 */
        .social-container { display: flex; gap: 15px; margin-top: 30px; }
        .win-btn {
            background: var(--win-bg); color: black; border-top: 2px solid var(--win-light);
            border-left: 2px solid var(--win-light); border-bottom: 2px solid var(--win-black);
            border-right: 2px solid var(--win-black); padding: 10px 20px; font-weight: bold;
            text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .win-btn:active { border: 2px solid var(--win-black); }

        /* MENÚ BLOQUE DE TIERRA MC */
        .menu-btn { position: fixed; top: 20px; right: 20px; z-index: 1000; cursor: pointer; padding: 15px; background: #8B4513; border: 4px solid #5D2E0A; font-weight: bold; }
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: url('https://www.minecrafttexturepacks.com/wp-content/uploads/2012/03/dirt.jpg');
            border-left: 5px solid #5D2E0A; transition: 0.5s; z-index: 999; padding-top: 100px;
        }
        .sidebar a { display: block; padding: 20px; color: white; text-decoration: none; font-size: 1.5rem; background: rgba(0,0,0,0.5); margin: 10px; border: 2px solid #333; }
        .sidebar a:hover { background: #53fc18; color: black; }

        /* CUADROS WIN98 PARA INFO */
        .win-window { background: var(--win-bg); padding: 2px; width: 80%; max-width: 600px; margin: 100px auto; color: black; border: 2px solid black; box-shadow: 10px 10px 0px rgba(0,0,0,0.5); }
        .win-bar { background: #000080; color: white; padding: 5px; font-weight: bold; display: flex; justify-content: space-between; }
        .win-body { padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="parallax-bg"></div>

<div class="menu-btn" onclick="document.getElementById('sidebar').style.right='0'">MENU</div>

<div class="sidebar" id="sidebar">
    <a href="#inicio" onclick="document.getElementById('sidebar').style.right='-300px'">INICIO</a>
    <a href="#servidor" onclick="document.getElementById('sidebar').style.right='-300px'">IP SERVER</a>
    <a href="#descargas" onclick="document.getElementById('sidebar').style.right='-300px'">MODS</a>
</div>

<section id="inicio" class="title-container">
    <h1 class="main-title">N_LAND</h1>
    <div class="social-container">
        <a href="https://kick.com/luisardito" class="win-btn">KICK</a>
        <a href="https://www.youtube.com/@Luisarditoprime" class="win-btn">YOUTUBE</a>
        <a href="https://www.instagram.com/luisarditooo" class="win-btn">INSTAGRAM</a>
    </div>
</section>

<section id="servidor">
    <div class="win-window">
        <div class="win-bar"><span>IP_SERVER.exe</span><span>X</span></div>
        <div class="win-body">
            <h2>IP DEL SERVIDOR</h2>
            <div style="background: white; padding: 20px; border: 2px inset gray;">N_LAND.aternos.me:20942</div>
        </div>
    </div>
</section>

<section id="descargas">
    <div class="win-window">
        <div class="win-bar"><span>MODS.rar</span><span>X</span></div>
        <div class="win-body">
            <h2>DESCARGA MODS</h2>
            <a href="https://www.mediafire.com/file/q676fxngf4yeaud/Minecraft.rar/file" class="win-btn">DESCARGAR AHORA</a>
        </div>
    </div>
</section>

</body>
</html>
